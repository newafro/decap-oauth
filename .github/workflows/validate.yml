name: Validate OAuth Proxy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Validate deploy-config preflight
        env:
          GITHUB_OAUTH_ID: ci-client-id
          GITHUB_OAUTH_SECRET: ci-client-secret
          PUBLIC_URL: https://decap-oauth.newafro.com
          GITHUB_REPO_PRIVATE: "0"
          RENDER_CUSTOM_DOMAIN_TARGET: newafro-decap-oauth.onrender.com
        run: npm run check:deploy-config
