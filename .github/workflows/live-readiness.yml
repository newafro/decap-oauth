name: Live OAuth Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "37 8 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  live-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check live OAuth proxy
        run: npm run check:live
