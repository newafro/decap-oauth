name: OAuth Operator Access Preflight

on:
  workflow_dispatch:
  schedule:
    - cron: "47 8 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  operator-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check operator access
        env:
          GITHUB_OAUTH_ID: ${{ secrets.GITHUB_OAUTH_ID }}
          GITHUB_OAUTH_SECRET: ${{ secrets.GITHUB_OAUTH_SECRET }}
        run: npm run check:operator
